<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ant Retro Pixel Simulator</title>
    <!-- Retro Pixel Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Floating Retro Pixel UI -->
    <button id="btn-place-nest" class="pixel-btn">PLACE NEST</button>
    <button id="btn-spawn-ant" class="pixel-btn" style="display: none;">SPAWN ANT</button>
    <button id="btn-settings" class="pixel-btn system-btn">SETTINGS</button>
    
    <!-- Retro Settings Modal -->
    <div id="settings-modal" class="pixel-modal" style="display: none;">
        <div class="pixel-modal-content">
            <div class="pixel-modal-header">
                <h2>SETTINGS</h2>
                <span class="pixel-modal-close">&times;</span>
            </div>
            <div class="pixel-modal-body">
                <p>Configure your retro world sandbox options:</p>
                <button id="btn-recreate-world" class="pixel-btn modal-btn">RECREATE WORLD</button>
            </div>
        </div>
    </div>
    
    <canvas id="game-canvas"></canvas>
    <script src="game.js"></script>
</body></html>
